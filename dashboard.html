<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Dashboard (Researcher Only)</title>
<style>
  :root {
    --bg: #f5f6fa; --panel: #ffffff; --text: #172033; --ink: #172033;
    --muted: #667085; --line: #d7dce8; --border: #d7dce8; --accent: #315eea;
    --accent-soft: #e7edff; --good: #067647; --warn: #b58900;
    --shadow: 0 8px 28px rgba(16, 24, 40, 0.08);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 16px 22px; background: var(--panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; }
  header h1 { margin: 0; font-size: 20px; }
  header .subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 16px 20px 80px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  h2 { margin: 0; font-size: 16px; font-weight: 800; }
  button { font-family: inherit; font-size: 14px; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; cursor: pointer; background: white; color: var(--text); font-weight: 650; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  input[type=email], input[type=password] { font-family: inherit; font-size: 14px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; width: 100%; margin-bottom: 10px; background: white; color: var(--text); }
  label { display:block; font-size:12px; font-weight:750; color:var(--muted); margin-bottom:6px; letter-spacing:0.02em; }
  .hidden { display: none !important; }
  .error-text { color: #9f1239; font-size: 13px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  .status-open { color: var(--warn); font-weight: 650; }
  .status-full { color: var(--accent); font-weight: 650; }
  .status-completed { color: var(--good); font-weight: 700; }
  .sentence-detail { background: #fbfcff; border: 1px solid var(--border); padding: 12px 14px; border-radius: 10px; margin: 8px 0; font-size: 13px; line-height: 1.5; }
  .tally { color: var(--muted); }
  .note-line { color: var(--text); background: #fff8e6; border: 1px solid #f2e2b0; border-radius: 8px; padding: 6px 9px; margin-top: 6px; font-size: 12px; }
  .toggle-row { cursor: pointer; }
  .toggle-row:hover { background: #f2f5ff; }
  .summary-grid { display: flex; gap: 24px; flex-wrap: wrap; }
  .summary-stat { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
  .summary-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.02em; }
  .pill { display:inline-block; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border); background:#fbfcff; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Study Dashboard</h1>
  <div class="subtitle">Researcher-only monitoring and data export.</div>
</header>
<div class="wrap">
  <div id="login-card" class="card">
    <p>Sign in with the researcher account you created in Firebase Authentication.</p>
    <input id="login-email" type="email" placeholder="you@example.com">
    <input id="login-password" type="password" placeholder="Password">
    <button id="btn-login">Sign in</button>
    <div id="login-error" class="error-text hidden"></div>
  </div>

  <div id="dashboard" class="card hidden">
    <div class="summary-grid" id="summary-grid"></div>
  </div>

  <div id="emails-card" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <h2 style="margin:0; font-size:1.05rem;">Emails</h2>
      <button id="btn-export">Export labeled data (CSV)</button>
    </div>
    <div id="export-status" style="font-size:0.85rem; color:#6b7280; margin-bottom:10px;"></div>
    <table>
      <thead><tr><th>Blind ID</th><th>Subject</th><th>Assigned</th><th>Completed</th><th>Status</th></tr></thead>
      <tbody id="emails-tbody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, onSnapshot, getDocs, query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// PASTE THE SAME FIREBASE WEB CONFIG AS index.html HERE.
const firebaseConfig = {
  apiKey: "AIzaSyDpX_sCuykEEyihYBn8F_m8Tfc27cPCVRc",
  authDomain: "undergrad-annotation-study.firebaseapp.com",
  projectId: "undergrad-annotation-study",
  storageBucket: "undergrad-annotation-study.firebasestorage.app",
  messagingSenderId: "32587391823",
  appId: "1:32587391823:web:1f364b07e75046fbc79b3a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let emailsCache = {};
let sentenceProgressCache = {};

document.getElementById("btn-login").addEventListener("click", async () => {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    const el = document.getElementById("login-error");
    el.textContent = "Sign-in failed: " + err.message;
    el.classList.remove("hidden");
  }
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("login-card").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("emails-card").classList.remove("hidden");
    startLiveListeners();
  }
});

function startLiveListeners() {
  onSnapshot(collection(db, "emails"), (snap) => {
    emailsCache = {};
    snap.forEach(d => { emailsCache[d.id] = d.data(); });
    renderEmails();
  });
  onSnapshot(collection(db, "sentence_progress"), (snap) => {
    sentenceProgressCache = {};
    snap.forEach(d => { sentenceProgressCache[d.id] = d.data(); });
    renderEmails();
  });
}

function renderEmails() {
  const emailIds = Object.keys(emailsCache).sort();
  const tbody = document.getElementById("emails-tbody");
  tbody.innerHTML = "";

  let totalCompleted = 0;
  let totalAssignedFull = 0;
  let totalLabelsSubmitted = 0;

  emailIds.forEach(emailId => {
    const e = emailsCache[emailId];
    const statusClass = e.status === "completed" ? "status-completed" : (e.status === "assigned_full" ? "status-full" : "status-open");
    if (e.status === "completed") totalCompleted += 1;
    if (e.status === "assigned_full" || e.status === "completed") totalAssignedFull += 1;

    const row = document.createElement("tr");
    row.className = "toggle-row";
    row.innerHTML = `
      <td>${emailId}</td>
      <td>${escapeHtml(e.subject || "")}</td>
      <td>${e.assigned_count || 0}/3</td>
      <td>${e.completed_count || 0}/3</td>
      <td class="${statusClass}">${e.status}</td>
    `;
    row.addEventListener("click", () => toggleDetail(emailId, row));
    tbody.appendChild(row);
  });

  Object.values(sentenceProgressCache).forEach(sp => { totalLabelsSubmitted += (sp.label_count || 0); });

  const grid = document.getElementById("summary-grid");
  grid.innerHTML = `
    <div><div class="summary-stat">${emailIds.length}</div><div class="summary-label">Total emails</div></div>
    <div><div class="summary-stat">${totalCompleted}</div><div class="summary-label">Fully completed</div></div>
    <div><div class="summary-stat">${totalAssignedFull}</div><div class="summary-label">Fully assigned</div></div>
    <div><div class="summary-stat">${totalLabelsSubmitted}</div><div class="summary-label">Sentence labels submitted</div></div>
  `;
}

function toggleDetail(emailId, row) {
  const existing = row.nextElementSibling;
  if (existing && existing.classList.contains("detail-row")) {
    existing.remove();
    return;
  }
  document.querySelectorAll(".detail-row").forEach(el => el.remove());

  const email = emailsCache[emailId];
  const detailRow = document.createElement("tr");
  detailRow.className = "detail-row";
  const cell = document.createElement("td");
  cell.colSpan = 5;

  const sentenceIds = (email.sentences || []).map(s => s.sentence_id);
  let html = "";
  sentenceIds.forEach(sid => {
    const sentenceText = (email.sentences.find(s => s.sentence_id === sid) || {}).text || "";
    const sp = sentenceProgressCache[sid] || { label_count: 0, label_tally: { emotional_labels: {}, strategy_labels: {} } };
    const emoTally = Object.entries(sp.label_tally?.emotional_labels || {}).map(([k, v]) => `${k}: ${v}`).join(", ") || "none yet";
    const stratTally = Object.entries(sp.label_tally?.strategy_labels || {}).map(([k, v]) => `${k}: ${v}`).join(", ") || "none yet";
    const notes = (sp.notes_collected || []).filter(n => n && n.trim());
    const notesHtml = notes.length
      ? notes.map(n => `<div class="note-line">Note: ${escapeHtml(n)}</div>`).join("")
      : "";
    html += `
      <div class="sentence-detail">
        <div><strong>${sid}</strong> — labeled by ${sp.label_count || 0}/3</div>
        <div>${escapeHtml(sentenceText)}</div>
        <div class="tally">Emotional: ${emoTally}</div>
        <div class="tally">Strategy: ${stratTally}</div>
        ${notesHtml}
      </div>
    `;
  });
  cell.innerHTML = html;
  detailRow.appendChild(cell);
  row.after(detailRow);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ---------------------------------------------------------------------
// CSV export -- pulls the full raw `labels` collection (researcher-only
// read, per Firestore rules) and flattens it into one row per submission.
// ---------------------------------------------------------------------
document.getElementById("btn-export").addEventListener("click", async () => {
  const statusEl = document.getElementById("export-status");
  statusEl.textContent = "Fetching labeled data...";
  try {
    const snap = await getDocs(query(collection(db, "labels")));
    const rows = [];
    snap.forEach(d => {
      const r = d.data();
      const emoRatings = Object.entries(r.label_ratings?.emotional_labels || {}).map(([k, v]) => `${k}:${v}`).join(";");
      const stratRatings = Object.entries(r.label_ratings?.strategy_labels || {}).map(([k, v]) => `${k}:${v}`).join(";");
      rows.push({
        participant_id: r.participant_id || "",
        email_id: r.email_id || "",
        sentence_id: r.sentence_id || "",
        sentence_text: r.sentence_text || "",
        emotional_labels: (r.emotional_labels || []).join(";"),
        strategy_labels: (r.strategy_labels || []).join(";"),
        emotional_ratings: emoRatings,
        strategy_ratings: stratRatings,
        unclear: r.unclear ? "TRUE" : "FALSE",
        notes: r.notes || "",
        submitted_at: r.submitted_at ? r.submitted_at.toDate().toISOString() : "",
      });
    });

    if (rows.length === 0) {
      statusEl.textContent = "No labeled data found yet.";
      return;
    }

    const headers = Object.keys(rows[0]);
    const csvLines = [headers.join(",")];
    rows.forEach(row => {
      csvLines.push(headers.map(h => csvEscape(row[h])).join(","));
    });
    const csvContent = csvLines.join("\n");

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const ts = new Date().toISOString().replace(/[:.]/g, "-");
    a.href = url;
    a.download = `live_experiment_labels_export_${ts}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    statusEl.textContent = `Exported ${rows.length} labeled rows.`;
  } catch (err) {
    console.error(err);
    statusEl.textContent = "Export failed: " + err.message;
  }
});

function csvEscape(value) {
  const str = String(value ?? "");
  if (str.includes(",") || str.includes('"') || str.includes("\n")) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}
</script>
</body>
</html>
